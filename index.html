<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRADELOG PRO+</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-feature-settings: "zero" off; }
    body { background: #0a0c0f; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0c0f; }
    ::-webkit-scrollbar-thumb { background: #1e3a2f; border-radius: 2px; }
    input, select, textarea { outline: none; }
    .glow { box-shadow: 0 0 20px rgba(52,211,153,0.15); }
    .tab-active { background: #0f2018 !important; color: #34d399 !important; border-bottom: 2px solid #34d399 !important; }
    .tab { color: #4a5568; border-bottom: 2px solid transparent; transition: all 0.2s; cursor: pointer; }
    .tab:hover { color: #9ca3af; }
    .card { background: #0f1419; border: 1px solid #1a2332; border-radius: 12px; }
    .btn-green { background: #34d399; color: #0a0c0f; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif; }
    .btn-green:hover { background: #6ee7b7; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: #34d399; border: 1px solid #34d399; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-family: 'Roboto', sans-serif, monospace; }
    .btn-outline:hover { background: rgba(52,211,153,0.1); }
    .input-field { background: #0a0c0f; border: 1px solid #1a2332; border-radius: 8px; color: #e2e8f0; padding: 10px 14px; font-family: 'Roboto', sans-serif, monospace; font-size: 14px; width: 100%; }
    .input-field:focus { border-color: #34d399; }
    .pos { color: #34d399; } .neg { color: #f87171; }
    .phase-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 1px; font-family: 'Syne', sans-serif; }
    .eval-badge { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .funded-badge { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .progress-bar { height: 6px; border-radius: 3px; background: #1a2332; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.85} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STORAGE_KEY = "trading-journal-v1";

    const defaultRules = {
      environment: "LIVE", withdrawals: "Day One", profitSplit: "80/20",
      maxAccounts: 5, maxWithdrawalAmount: "No Max", bufferRequirement: "None",
      dailyLossRule: "None", consistencyRule: "None", newsRule: "Yes", scalingPlan: "None",
    };

    const initialState = {
      phase: "setup", accountSize: 25000, profitTarget: 10, minTradingDays: 3,
      drawdownType: "End Of Day", maxDrawdownPct: 5, maxDrawdownAmt: 2000, maxDailyLossPct: 2,
      rules: defaultRules, evalTrades: [], fundedTrades: [], payouts: [],
      evalStartBalance: 25000, fundedStartBalance: 25000, evalPassed: false, winDaysEnabled: true,
      allTime: { passedEvals: [], blownAccounts: [], payouts: [] },
    };

    function loadState() {
      try { const r = localStorage.getItem(STORAGE_KEY); if (r) return { ...initialState, ...JSON.parse(r) }; } catch {}
      return initialState;
    }
    function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

    const fmt = n => n >= 0
      ? `+$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`
      : `-$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    const fmtPct = n => `${n>=0?"+":""}${n.toFixed(2)}%`;
    const today = () => new Date().toISOString().split("T")[0];

    function getUniqueTradingDays(trades) { return new Set(trades.map(t=>t.date)).size; }
    function getWinningDays(trades) {
      const b={};for(const t of trades)b[t.date]=(b[t.date]||0)+t.pnl;
      return Object.values(b).filter(v=>v>0).length;
    }
    function getBalance(start, trades) { return trades.reduce((a,t)=>a+t.pnl,start); }
    function getDrawdownDollar(start, trades) {
      let peak=start,maxDD=0,running=start;
      for(const t of trades){running+=t.pnl;if(running>peak)peak=running;const dd=peak-running;if(dd>maxDD)maxDD=dd;}
      return maxDD;
    }
    function getDailyPnl(trades) {
      const b={};for(const t of trades)b[t.date]=(b[t.date]||0)+t.pnl;return b;
    }
    function getWorstDayLoss(trades) {
      const b={};for(const t of trades)b[t.date]=(b[t.date]||0)+t.pnl;
      const vals=Object.values(b);return vals.length?Math.abs(Math.min(0,...vals)):0;
    }
    // Eval balance history with continuous timeline
    function getEvalHistory(startBalance, trades, startDate) {
      const dailyPnl={};
      for(const t of trades) dailyPnl[t.date]=(dailyPnl[t.date]||0)+t.pnl;
      const startD = startDate || (Object.keys(dailyPnl).sort()[0]) || new Date().toISOString().split("T")[0];
      const endD = new Date().toISOString().split("T")[0];
      const dateRange=[];
      let cur=new Date(startD), end=new Date(endD);
      while(cur<=end){ dateRange.push(cur.toISOString().split("T")[0]); cur=new Date(cur.getTime()+86400000); }
      let running=startBalance;
      const history=[{date:startD,balance:startBalance,pnl:0,hasTraded:false}];
      for(const date of dateRange){
        if(date===startD) continue;
        const pnl=dailyPnl[date]||0;
        running+=pnl;
        history.push({date,balance:running,pnl,hasTraded:!!dailyPnl[date]});
      }
      return history;
    }
    function getMllHistory(startBalance, trades, maxDrawdownAmt, accountStartDate) {
      const dailyPnl={};
      for(const t of trades) dailyPnl[t.date]=(dailyPnl[t.date]||0)+t.pnl;
      const startD = accountStartDate || (Object.keys(dailyPnl).sort()[0]) || new Date().toISOString().split("T")[0];
      const endD = new Date().toISOString().split("T")[0];
      const dateRange=[];
      let cur=new Date(startD), end=new Date(endD);
      while(cur<=end){ dateRange.push(cur.toISOString().split("T")[0]); cur=new Date(cur.getTime()+86400000); }
      let running=startBalance, mll=startBalance-maxDrawdownAmt, locked=false;
      // Start anchor point (before any trades)
      const history=[{date:"__start__",balance:startBalance,mll,locked,pnl:0,hasTraded:false}];
      for(const date of dateRange){
        const pnl=dailyPnl[date]||0;
        const hasTraded=!!dailyPnl[date];
        running+=pnl;
        if(hasTraded&&!locked){
          const candidate=running-maxDrawdownAmt;
          if(candidate>mll) mll=candidate;
          if(mll>=startBalance){mll=startBalance;locked=true;}
        }
        history.push({date,balance:running,mll,locked,pnl,hasTraded});
      }
      return history;
    }

    function App() {
      const [state, setState] = useState(loadState);
      const [view, setView] = useState("dashboard");
      const [tradeForm, setTradeForm] = useState({symbol:"",direction:"",contracts:1,entryPrice:"",exitPrice:"",entryTime:"10:10",entryAmPm:"AM",exitTime:"10:15",exitAmPm:"AM",stopLoss:"",tags:"",rating:0,notes:"",date:today()});
      const [formError, setFormError] = useState("");
      const [showPassModal, setShowPassModal] = useState(false);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showPayoutModal, setShowPayoutModal] = useState(false);
      const [showTotalReset, setShowTotalReset] = useState(false);
      const [payoutAmount, setPayoutAmount] = useState("");
      const [payoutError, setPayoutError] = useState("");
      const [showAllTime, setShowAllTime] = useState(false);
      const [chartPopup, setChartPopup] = useState(null);
      const [setupStep, setSetupStep] = useState(0);

      useEffect(()=>{saveState(state);},[state]);

      const currentTrades = state.phase==="funded"?state.fundedTrades:state.evalTrades;
      const startBalance = state.phase==="funded"?state.fundedStartBalance:state.evalStartBalance;
      const balance = getBalance(startBalance,currentTrades);
      const pnl = balance-startBalance;
      const pnlPct = (pnl/startBalance)*100;
      const drawdownDollar = getDrawdownDollar(startBalance,currentTrades);
      const maxDrawdownAmt = state.maxDrawdownAmt||2000;
      const maxDailyLossAmt = startBalance*((state.maxDailyLossPct||2)/100);
      const worstDayLoss = getWorstDayLoss(currentTrades);
      const dailyPnl = getDailyPnl(currentTrades);

      // MLL for funded
      const mllHistory = state.phase==="funded" ? getMllHistory(startBalance,currentTrades,maxDrawdownAmt,state.fundedStartDate||today()) : [];
      const evalHistory = state.phase==="eval" ? getMllHistory(startBalance,currentTrades,maxDrawdownAmt,state.evalStartDate||today()) : [];
      const currentMllEntry = mllHistory.length>0 ? mllHistory[mllHistory.length-1] : {mll:startBalance-maxDrawdownAmt,locked:false};
      const currentMll = currentMllEntry.mll;
      const mllLocked = currentMllEntry.locked;
      const buffer = balance - currentMll;

      const blownByDrawdown = state.phase==="funded" ? balance<=currentMll : drawdownDollar>=maxDrawdownAmt;
      const blownByDailyLoss = worstDayLoss>=maxDailyLossAmt&&state.maxDailyLossPct>0;
      const isBlown = blownByDrawdown||blownByDailyLoss;
      const blownReason = state.phase==="funded"
        ? (blownByDailyLoss?`Daily loss limit exceeded`:`Balance dropped below MLL of $${currentMll.toLocaleString()}`)
        : (blownByDrawdown?`Max drawdown of $${maxDrawdownAmt.toLocaleString()} exceeded`:`Daily loss limit of $${maxDailyLossAmt.toFixed(0)} exceeded`);
      const tradingDays = getUniqueTradingDays(currentTrades);
      const winningDays = getWinningDays(currentTrades);
      const effectiveDays = tradingDays;
      const profitTargetAmt = startBalance*(state.profitTarget/100);
      const profitProgress = Math.min((pnl/profitTargetAmt)*100,100);
      const daysProgress = Math.min((tradingDays/5)*100,100);
      const evalPassed = state.phase==="eval"&&pnl>=profitTargetAmt&&(!state.winDaysEnabled||tradingDays>=5)&&!isBlown;

      const POINT_VALUES = {"NQ":20,"MNQ":2,"ES":50,"MES":5};
      const calcPnl = () => {
        const ep=parseFloat(tradeForm.entryPrice),xp=parseFloat(tradeForm.exitPrice),c=parseInt(tradeForm.contracts)||1;
        const sym=tradeForm.symbol.split("—")[0].trim();
        const pv=POINT_VALUES[sym]||1;
        const dir=tradeForm.direction.includes("Long")?1:-1;
        if(!isNaN(ep)&&!isNaN(xp))return(xp-ep)*c*pv*dir;
        return null;
      };
      const logTrade = () => {
        if(!tradeForm.symbol)return setFormError("Select a symbol");
        if(!tradeForm.direction)return setFormError("Select a direction");
        if(!tradeForm.entryPrice)return setFormError("Enter entry price");
        if(!tradeForm.exitPrice)return setFormError("Enter exit price");
        const pnlNum=calcPnl();
        if(pnlNum===null)return setFormError("Invalid prices");
        setFormError("");
        const trade={id:Date.now(),pair:tradeForm.symbol.split("—")[0].trim(),pnl:pnlNum,notes:tradeForm.notes,date:tradeForm.date,
          direction:tradeForm.direction,contracts:tradeForm.contracts,entryPrice:tradeForm.entryPrice,exitPrice:tradeForm.exitPrice,
          entryTime:`${tradeForm.entryTime} ${tradeForm.entryAmPm}`,exitTime:`${tradeForm.exitTime} ${tradeForm.exitAmPm}`,
          stopLoss:tradeForm.stopLoss,tags:tradeForm.tags,rating:tradeForm.rating,symbol:tradeForm.symbol};
        setState(s=>{const n={...s};if(s.phase==="funded")n.fundedTrades=[...s.fundedTrades,trade];else n.evalTrades=[...s.evalTrades,trade];return n;});
        setTradeForm({symbol:"",direction:"",contracts:1,entryPrice:"",exitPrice:"",entryTime:"10:10",entryAmPm:"AM",exitTime:"10:15",exitAmPm:"AM",stopLoss:"",tags:"",rating:0,notes:"",date:today()});
        setView("dashboard");
      };

      const passFunded = () => {
        setState(s=>({...s,phase:"funded",evalPassed:true,fundedStartBalance:s.accountSize,fundedTrades:[],payouts:[],fundedStartDate:today(),
          allTime:{...s.allTime,passedEvals:[...(s.allTime?.passedEvals||[]),{id:Date.now(),date:today(),accountSize:s.accountSize,pnl:pnl,days:effectiveDays}]}}));
        setShowPassModal(false);
      };

      const requestPayout = () => {
        const amt = parseFloat(payoutAmount);
        const available = pnl * 0.8;
        const totalPaidOut = (state.payouts||[]).reduce((a,p)=>a+p.amount,0);
        const remaining = available - totalPaidOut;
        if(isNaN(amt)||amt<=0) return setPayoutError("Enter a valid amount");
        if(amt>remaining) return setPayoutError(`Max available: $${remaining.toFixed(2)}`);
        setPayoutError("");
        setState(s=>{
          const payoutTrade={id:Date.now()+1,pair:"PAYOUT",pnl:-amt,notes:"Payout withdrawal",date:today(),direction:"",isPayout:true};
          return {...s,
            fundedTrades:[...s.fundedTrades,payoutTrade],
            payouts:[...(s.payouts||[]),{id:Date.now(),amount:amt,date:today(),status:"Pending"}],
            allTime:{...s.allTime,payouts:[...(s.allTime?.payouts||[]),{id:Date.now(),amount:amt,date:today(),accountSize:s.accountSize}]}
          };
        });
        setPayoutAmount("");
        setShowPayoutModal(false);
      };

      const reset = () => { setState(s=>({...initialState,phase:"setup",allTime:s.allTime||{passedEvals:[],blownAccounts:[],payouts:[]}})); setShowResetConfirm(false); setView("dashboard"); };

      if(state.phase==="setup") return <Setup state={state} setState={setState} step={setupStep} setStep={setSetupStep}/>;

      if(isBlown) return (
        <div style={{fontFamily:"'Roboto', sans-serif,monospace",background:"#0a0c0f",minHeight:"100vh",color:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{textAlign:"center",maxWidth:420}}>
            <div style={{fontSize:80,marginBottom:8,animation:"shake 0.6s ease"}}>💥</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:52,color:"#ef4444",letterSpacing:"-2px",lineHeight:1,marginBottom:12,animation:"flicker 1.5s infinite"}}>BLOWN</div>
            <div style={{color:"#6b7280",fontSize:14,marginBottom:32}}>{state.phase==="funded"?"Funded Account":"Evaluation"} — Account Terminated</div>
            <div style={{background:"#0f1419",border:"1px solid #3f1515",borderRadius:16,padding:24,marginBottom:28}}>
              {[["Reason",blownReason,true],["Total Drawdown",`-$${drawdownDollar.toFixed(2)}`,true],["Final Balance",`$${balance.toFixed(2)}`,true],["Total P&L",`-$${Math.abs(pnl).toFixed(2)}`,true],["Days Traded",tradingDays,false]].map(([k,v,red],i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<4?"1px solid #1a0a0a":"none"}}>
                  <span style={{color:"#6b7280"}}>{k}</span>
                  <span style={{color:red?"#ef4444":"#9ca3af",fontSize:13}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{color:"#4a5568",fontSize:13,marginBottom:28,fontStyle:"italic"}}>Review your trades, learn from the losses, and come back stronger.</div>
            <button onClick={()=>{setState(s=>({...initialState,phase:"setup",allTime:{...(s.allTime||{passedEvals:[],payouts:[]}),blownAccounts:[...(s.allTime?.blownAccounts||[]),{id:Date.now(),date:today(),accountSize:s.accountSize,reason:blownReason,pnl:pnl,phase:s.phase}]}}));setShowResetConfirm(false);}} style={{padding:"14px 40px",background:"#ef4444",color:"#fff",border:"none",borderRadius:10,fontSize:15,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700}}>Start Over</button>
          </div>
          {showResetConfirm&&(
            <div className="modal-overlay">
              <div className="card" style={{padding:28,maxWidth:360,width:"100%"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,marginBottom:12}}>Reset Everything?</div>
                <div style={{color:"#9ca3af",fontSize:14,marginBottom:20}}>This will clear all trades and restart setup.</div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setShowResetConfirm(false)} className="btn-outline" style={{flex:1,padding:"10px"}}>Cancel</button>
                  <button onClick={reset} style={{flex:1,padding:"10px",background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace"}}>Reset All</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );

      return (
        <div style={{fontFamily:"'Roboto', sans-serif,monospace",background:"#0a0c0f",minHeight:"100vh",color:"#e2e8f0"}}>
          {/* Header */}
          <div style={{borderBottom:"1px solid #1a2332",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#34d399"}} className="pulse"/>
              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,letterSpacing:"-0.5px"}}>TRADELOG</span>
              <span style={{color:"#4a5568",fontSize:12}}>PRO+</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span className={`phase-badge ${state.phase==="funded"?"funded-badge":"eval-badge"}`}>{state.phase==="funded"?"⚡ FUNDED":"🎯 EVALUATION"}</span>
              {evalPassed&&state.phase==="eval"&&<button className="btn-green" style={{padding:"6px 14px",fontSize:12}} onClick={()=>setShowPassModal(true)}>🏆 PASS EVAL</button>}
              <button onClick={()=>setShowAllTime(true)} style={{padding:"6px 14px",fontSize:11,background:"transparent",border:"1px solid #1e3a2f",borderRadius:8,color:"#34d399",cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace",letterSpacing:"0.5px"}}>📊 All Time</button>
              <button onClick={()=>setShowResetConfirm(true)} style={{padding:"6px 14px",fontSize:11,background:"transparent",border:"1px solid #374151",borderRadius:8,color:"#6b7280",cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace",letterSpacing:"0.5px"}}>🔄 Fresh Start</button>
            </div>
          </div>

          {/* Nav */}
          <div style={{borderBottom:"1px solid #1a2332",display:"flex",padding:"0 20px"}}>
            {[["dashboard","Dashboard"],["log","Log Trade"],["history","History"],["rules","Rules"]].map(([id,label])=>(
              <button key={id} onClick={()=>setView(id)} style={{padding:"14px 18px",fontSize:13,background:"none",border:"none",fontFamily:"'Roboto', sans-serif,monospace",letterSpacing:"0.5px",cursor:"pointer"}} className={`tab ${view===id?"tab-active":""}`}>{label}</button>
            ))}
            <button onClick={()=>setShowResetConfirm(true)} style={{marginLeft:"auto",padding:"14px 0",fontSize:12,background:"none",border:"none",color:"#1a2332",cursor:"default",fontFamily:"'Roboto', sans-serif,monospace"}}></button>
          </div>

          <div style={{padding:"20px",maxWidth:900,margin:"0 auto"}} className="fade-in">

            {/* DASHBOARD */}
            {view==="dashboard"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:20}}>
                  {[
                    {label:"Balance",value:`$${balance.toLocaleString("en-US",{minimumFractionDigits:2})}`,sub:`Started: $${startBalance.toLocaleString()}`},
                    {label:"Total P&L",value:fmt(pnl),pct:fmtPct(pnlPct),pos:pnl>=0},
                    {label:"Drawdown",value:`-$${drawdownDollar.toFixed(2)}`,sub:`Max: $${maxDrawdownAmt.toLocaleString()}`,warn:drawdownDollar>maxDrawdownAmt*0.7},
                  ].map((s,i)=>(
                    <div key={i} className="card" style={{padding:16}}>
                      <div style={{fontSize:11,color:"#4a5568",letterSpacing:"1px",marginBottom:6,fontFamily:"'Syne',sans-serif",fontWeight:600}}>{s.label.toUpperCase()}</div>
                      <div style={{fontSize:22,fontWeight:500,color:s.warn?"#fbbf24":s.pos!==undefined?(s.pos?"#34d399":"#f87171"):"#e2e8f0",lineHeight:1.2}}>{s.value}</div>
                      {s.pct&&<div style={{fontSize:12,color:s.pos?"#34d399":"#f87171",marginTop:2}}>{s.pct}</div>}
                      {s.sub&&<div style={{fontSize:11,color:"#4a5568",marginTop:4}}>{s.sub}</div>}
                    </div>
                  ))}
                  {/* Winning Days Card - funded only */}
                  {state.phase==="funded"&&(
                  <div className="card" style={{padding:16}}>
                    <div style={{fontSize:11,color:"#4a5568",letterSpacing:"1px",marginBottom:6,fontFamily:"'Syne',sans-serif",fontWeight:600}}>WINNING DAYS REQ.</div>
                    <div style={{fontSize:22,fontWeight:500,color:state.winDaysEnabled?(winningDays>=(state.minTradingDays||5)?"#34d399":"#e2e8f0"):"#6b7280",lineHeight:1.2,marginBottom:8}}>
                      {state.winDaysEnabled?`${winningDays}/${state.minTradingDays||5}`:"OFF"}
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      {[{label:"1",val:true,days:1},{label:"5",val:true,days:5},{label:"None",val:false,days:0}].map(({label,val,days})=>{
                        const active = !val?!state.winDaysEnabled:(state.winDaysEnabled&&(state.minTradingDays||5)===days);

                        </optgroup>
                        <optgroup label="Other">
                          <option>Other / Custom</option>
                        </optgroup>
                      </select>

                    </div>

                        <option>↓ Short</option>

                    <div>
                      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:6,fontFamily:"'Syne',sans-serif",fontWeight:600,letterSpacing:"0.5px"}}>ENTRY PRICE *</label>

                    {/* Exit Price */}
                    <div>
                      <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:6,fontFamily:"'Syne',sans-serif",fontWeight:600,letterSpacing:"0.5px"}}>EXIT PRICE *</label>

                  </div>

                  {tradeForm.entryPrice&&tradeForm.exitPrice&&tradeForm.direction&&(()=>{
                    const p=calcPnl();
                    const sl=parseFloat(tradeForm.stopLoss);
                    const ep=parseFloat(tradeForm.entryPrice),xp=parseFloat(tradeForm.exitPrice);
                    const reward=Math.abs(xp-ep), risk=Math.abs(ep-sl);
                    const rr=(!isNaN(sl)&&sl>0&&risk>0)?(reward/risk):null;
                    return p!==null?<div style={{margin:"12px 0",padding:"10px 16px",background:p>=0?"rgba(52,211,153,0.1)":"rgba(248,113,113,0.1)",border:`1px solid ${p>=0?"rgba(52,211,153,0.3)":"rgba(248,113,113,0.3)"}`,borderRadius:8}}>

                      </div>
                      {rr!==null&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                        <span style={{fontSize:12,color:"#9ca3af"}}>R:R Ratio</span>

                  <div style={{display:"flex",gap:12,marginTop:20}}>

                    <button className="btn-green" style={{flex:2,padding:"14px",fontSize:15}} onClick={logTrade}>Save Trade</button>
                  </div>
                </div>
              </div>

                      <span style={{fontSize:13,color:dayPnl>=0?"#34d399":"#f87171",fontWeight:600}}>Day: {fmt(dayPnl)}</span>
                    </div>
                    {currentTrades.filter(t=>t.date===date&&!t.isPayout).map(t=>{
                      const POINT_VALUES={"NQ":20,"MNQ":2,"ES":50,"MES":5};
                      const sym=(t.symbol||t.pair||"").split("—")[0].trim();
                      const pv=POINT_VALUES[sym]||1;
                      const c=parseInt(t.contracts)||1;
                      const dir=t.direction?.includes("Long")?1:-1;
                      const ep=parseFloat(t.entryPrice),xp=parseFloat(t.exitPrice),sl=parseFloat(t.stopLoss);
                      const reward=Math.abs(xp-ep);
                      const risk=Math.abs(ep-sl);
                      const rr=(!isNaN(sl)&&sl>0&&risk>0)?(reward/risk):null;
                      return (
                      <div key={t.id} className="card" style={{padding:"12px 16px",marginBottom:6,display:"flex",gap:12}}>

                            {t.direction&&<span style={{fontSize:11,padding:"1px 7px",borderRadius:4,background:t.direction.includes("Long")?"rgba(52,211,153,0.15)":"rgba(248,113,113,0.15)",color:t.direction.includes("Long")?"#34d399":"#f87171"}}>{t.direction}</span>}
                            {t.rating>0&&<span style={{fontSize:11,color:"#f59e0b"}}>{"★".repeat(t.rating)}</span>}
                            {t.entryTime&&<span style={{fontSize:11,color:"#4a5568"}}>{t.entryTime} → {t.exitTime}</span>}
                            {rr!==null&&<span style={{fontSize:11,padding:"1px 7px",borderRadius:4,background:rr>=1?"rgba(52,211,153,0.15)":"rgba(248,113,113,0.15)",color:rr>=1?"#34d399":"#f87171",fontWeight:600}}>R:R {rr.toFixed(2)}</span>}
                          </div>
                          {rr!==null&&<div style={{fontSize:11,color:"#4a5568",marginBottom:2}}>Risk: ${(risk*c*pv).toFixed(2)} · Reward: ${(reward*c*pv).toFixed(2)}</div>}
                          {t.tags&&<div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>{t.tags}</div>}
                          {t.notes&&<div style={{fontSize:12,color:"#6b7280"}}>{t.notes}</div>}
                        </div>
                        <div style={{fontSize:16,fontWeight:500,color:t.pnl>=0?"#34d399":"#f87171",whiteSpace:"nowrap"}}>{fmt(t.pnl)}</div>
                      </div>
                      );
                    })}
                  </div>
                ))}
                {currentTrades.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#4a5568"}}>No trades logged yet.</div>}
              </div>

                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:24}}>
                  {[
                    {label:"EVALS PASSED",value:(state.allTime?.passedEvals||[]).length,color:"#34d399"},
                    {label:"ACCOUNTS BLOWN",value:(state.allTime?.blownAccounts||[]).length,color:"#ef4444"},
                    {label:"TOTAL PAYOUTS",value:(state.allTime?.payouts||[]).length,color:"#60a5fa"},

                      <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#0a0c0f",borderRadius:8,marginBottom:6,border:"1px solid rgba(52,211,153,0.15)"}}>

                  <div style={{fontSize:11,color:"#4a5568",marginTop:8}}>Deletes all trades, history, payouts, evals. Cannot be undone.</div>
                </div>
              </div>
            </div>

          {showPayoutModal&&(
            <div className="modal-overlay">
              <div className="card" style={{padding:32,maxWidth:400,width:"100%"}}>

                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20}}>💰 Request Payout</div>
                  <button onClick={()=>setShowPayoutModal(false)} style={{background:"none",border:"none",color:"#4a5568",fontSize:20,cursor:"pointer"}}>✕</button>
                </div>
                <div style={{background:"#0a0c0f",borderRadius:10,padding:16,marginBottom:20}}>
                  {[
                    ["Total Profit",fmt(pnl)],

                    ["Already Requested",`$${((state.payouts||[]).reduce((a,p)=>a+p.amount,0)).toFixed(2)}`],

                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid #1a2332":"none"}}>

                      <span style={{color:i===3?"#34d399":"#e2e8f0",fontWeight:i===3?600:400,fontSize:13}}>{v}</span>
                    </div>

                </div>
                <label style={{fontSize:11,color:"#9ca3af",display:"block",marginBottom:8,fontFamily:"'Syne',sans-serif",fontWeight:600,letterSpacing:"0.5px"}}>AMOUNT TO REQUEST ($)</label>
                <input type="number" className="input-field" placeholder="Enter amount..." value={payoutAmount} onChange={e=>setPayoutAmount(e.target.value)} style={{marginBottom:12}}/>
                {payoutError&&<div style={{color:"#f87171",fontSize:13,marginBottom:12}}>⚠ {payoutError}</div>}
                <div style={{display:"flex",gap:12}}>
                  <button className="btn-outline" style={{flex:1,padding:"12px"}} onClick={()=>setShowPayoutModal(false)}>Cancel</button>
                  <button className="btn-green" style={{flex:1,padding:"12px",fontSize:14}} onClick={requestPayout}>Request →</button>
                </div>
              </div>
            </div>
          )}

          {showAllTime&&(
            <div className="modal-overlay" onClick={()=>setShowAllTime(false)}>
              <div className="card" style={{padding:28,maxWidth:500,width:"100%",maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20}}>📊 All Time Stats</div>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <button onClick={()=>setShowTotalReset(true)} style={{fontSize:11,padding:"6px 12px",background:"rgba(127,29,29,0.5)",border:"1px solid #ef4444",borderRadius:6,color:"#fca5a5",cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,letterSpacing:"0.3px"}}>🗑 Total Reset</button>
                    <button onClick={()=>setShowAllTime(false)} style={{background:"none",border:"none",color:"#4a5568",fontSize:20,cursor:"pointer"}}>✕</button>
                  </div>
                </div>

                {/* Summary Row */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
                  {[
                    {label:"EVALS PASSED",value:(state.allTime?.passedEvals||[]).length,color:"#34d399"},
                    {label:"ACCOUNTS BLOWN",value:(state.allTime?.blownAccounts||[]).length,color:"#ef4444"},
                    {label:"TOTAL PAID OUT",value:`$${(state.allTime?.payouts||[]).reduce((a,p)=>a+p.amount,0).toLocaleString("en-US",{minimumFractionDigits:2})}`,color:"#34d399"},
                  ].map(({label,value,color})=>(
                    <div key={label} style={{background:"#0a0c0f",borderRadius:8,padding:"12px",border:"1px solid #1a2332",textAlign:"center"}}>
                      <div style={{fontSize:10,color:"#4a5568",letterSpacing:"1px",marginBottom:6,fontFamily:"'Syne',sans-serif",fontWeight:600}}>{label}</div>
                      <div style={{fontSize:20,fontWeight:700,color}}>{value}</div>
                    </div>
                  ))}
                </div>

                {/* Passed Evals */}
                <div style={{marginBottom:20}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,color:"#34d399",letterSpacing:"1px",marginBottom:10}}>🏆 PASSED EVALS</div>
                  {(state.allTime?.passedEvals||[]).length===0
                    ?<div style={{color:"#4a5568",fontSize:13,padding:"12px 0"}}>No passed evals yet</div>
                    :[...(state.allTime?.passedEvals||[])].reverse().map(e=>(
                      <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#0a0c0f",borderRadius:8,marginBottom:6,border:"1px solid #1a2332"}}>
                        <div>
                          <div style={{fontSize:13,color:"#e2e8f0",fontWeight:600}}>${(e.accountSize||0).toLocaleString()} Account</div>
                          <div style={{fontSize:11,color:"#4a5568",marginTop:2}}>{e.date} · {e.days} winning days</div>
                        </div>
                        <div style={{fontSize:14,color:"#34d399",fontWeight:600}}>+${(e.pnl||0).toFixed(2)}</div>
                      </div>
                    ))
                  }
                </div>

                {/* Blown Accounts */}
                <div style={{marginBottom:20}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,color:"#ef4444",letterSpacing:"1px",marginBottom:10}}>💥 BLOWN ACCOUNTS</div>
                  {(state.allTime?.blownAccounts||[]).length===0
                    ?<div style={{color:"#4a5568",fontSize:13,padding:"12px 0"}}>No blown accounts</div>
                    :[...(state.allTime?.blownAccounts||[])].reverse().map(b=>(
                      <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#0a0c0f",borderRadius:8,marginBottom:6,border:"1px solid #1a2332"}}>
                        <div>
                          <div style={{fontSize:13,color:"#e2e8f0",fontWeight:600}}>${(b.accountSize||0).toLocaleString()} — {b.phase==="funded"?"Funded":"Eval"}</div>
                          <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{b.date} · {b.reason}</div>
                        </div>
                        <div style={{fontSize:14,color:"#ef4444",fontWeight:600}}>-${Math.abs(b.pnl||0).toFixed(2)}</div>
                      </div>
                    ))
                  }
                </div>

                {/* All Payouts */}
                <div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,color:"#fbbf24",letterSpacing:"1px",marginBottom:10}}>💰 ALL PAYOUTS</div>
                  {(state.allTime?.payouts||[]).length===0
                    ?<div style={{color:"#4a5568",fontSize:13,padding:"12px 0"}}>No payouts yet</div>
                    :[...(state.allTime?.payouts||[])].reverse().map(p=>(
                      <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#0a0c0f",borderRadius:8,marginBottom:6,border:"1px solid #1a2332"}}>
                        <div>
                          <div style={{fontSize:13,color:"#e2e8f0",fontWeight:600}}>${(p.accountSize||0).toLocaleString()} Account</div>
                          <div style={{fontSize:11,color:"#4a5568",marginTop:2}}>{p.date}</div>
                        </div>
                        <div style={{fontSize:14,color:"#fbbf24",fontWeight:600}}>+${(p.amount||0).toLocaleString("en-US",{minimumFractionDigits:2})}</div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          )}

          {showPassModal&&(
            <div className="modal-overlay">
              <div className="card" style={{padding:32,maxWidth:400,width:"100%",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:16}}>🏆</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,marginBottom:8}}>EVALUATION PASSED!</div>
                <div style={{color:"#9ca3af",marginBottom:24,fontSize:14}}>Congratulations! Move to your funded account and continue trading.</div>
                <div style={{background:"#0a0c0f",borderRadius:8,padding:16,marginBottom:24}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:"#4a5568"}}>Eval P&L</span><span className="pos">{fmt(pnl)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:"#4a5568"}}>Trading Days</span><span style={{color:"#e2e8f0"}}>{tradingDays}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#4a5568"}}>Funded Balance</span><span style={{color:"#34d399"}}>${state.accountSize.toLocaleString("en-US",{minimumFractionDigits:2})}</span></div>
                </div>
                <div style={{display:"flex",gap:12}}>
                  <button className="btn-outline" style={{flex:1,padding:"12px"}} onClick={()=>setShowPassModal(false)}>Cancel</button>
                  <button className="btn-green" style={{flex:1,padding:"12px",fontSize:14}} onClick={passFunded}>Move to Funded →</button>
                </div>
              </div>
            </div>
          )}

          {showTotalReset&&(
            <div className="modal-overlay">
              <div className="card" style={{padding:32,maxWidth:380,width:"100%",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"#ef4444",marginBottom:8}}>TOTAL RESET</div>
                <div style={{color:"#9ca3af",fontSize:14,marginBottom:12}}>This permanently deletes:</div>
                <div style={{background:"#0a0c0f",borderRadius:8,padding:"12px 16px",marginBottom:20,textAlign:"left"}}>
                  {["All trades (eval + funded)","All-time history","All payouts","Account settings","Everything"].map((item,i)=>(
                    <div key={i} style={{fontSize:13,color:"#f87171",padding:"3px 0"}}>✕ {item}</div>
                  ))}
                </div>
                <div style={{color:"#6b7280",fontSize:12,marginBottom:20}}>You will start completely fresh. Cannot be undone.</div>
                <div style={{display:"flex",gap:12}}>
                  <button onClick={()=>setShowTotalReset(false)} className="btn-outline" style={{flex:1,padding:"12px",fontSize:14}}>Cancel</button>
                  <button onClick={()=>{localStorage.removeItem("trading-journal-v1");window.location.reload();}} style={{flex:1,padding:"12px",background:"#ef4444",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14}}>Yes, Wipe It All</button>
                </div>
              </div>
            </div>
          )}

          {showResetConfirm&&(
            <div className="modal-overlay">
              <div className="card" style={{padding:28,maxWidth:360,width:"100%"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,marginBottom:12}}>Reset Everything?</div>
                <div style={{color:"#9ca3af",fontSize:14,marginBottom:20}}>This will delete all trades and account data.</div>
                <div style={{display:"flex",gap:10}}>
                  <button className="btn-outline" style={{flex:1,padding:"10px"}} onClick={()=>setShowResetConfirm(false)}>Cancel</button>
                  <button style={{flex:1,padding:"10px",background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace"}} onClick={reset}>Reset All</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Setup({state,setState,step,setStep}) {
      const [form,setForm] = useState({
        accountSize:25000,profitTarget:10,minTradingDays:3,
        drawdownType:"End Of Day",maxDrawdownPct:5,maxDrawdownAmt:2000,
        maxDailyLossPct:2,consistencyRule:"None",winDaysEnabled:true,
      });

      const finish = () => {
        const bufferMap={25000:1000,50000:2000,100000:4000,150000:6000};
        const bufferAmt=bufferMap[form.accountSize]||form.accountSize*0.04;
        setState(s=>({...s,...form,phase:"eval",evalStartBalance:form.accountSize,fundedStartBalance:form.accountSize,
          bufferRequirement:bufferAmt,evalStartDate:today(),rules:{...s.rules,consistencyRule:form.consistencyRule,bufferRequirement:`$${bufferAmt.toLocaleString()}`},
          winDaysEnabled:form.winDaysEnabled,
          evalTrades:[],fundedTrades:[]}));
      };

      const steps=[
        {title:"Account Size",content:(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {[25000,50000,100000,150000].map(v=>{
              const bm={25000:1000,50000:2000,100000:4000,150000:6000};
              return <button key={v} onClick={()=>setForm(f=>({...f,accountSize:v}))} style={{padding:"14px 20px",background:form.accountSize===v?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.accountSize===v?"#34d399":"#1a2332"}`,borderRadius:10,color:form.accountSize===v?"#34d399":"#9ca3af",fontSize:16,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:600,transition:"all 0.15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>${v.toLocaleString()}</span>
                <span style={{fontSize:12,opacity:0.6,fontFamily:"'Roboto', sans-serif,monospace",fontWeight:400}}>Buffer: ${bm[v].toLocaleString()} <span style={{color:"#34d399",opacity:1}}>(Funded)</span></span>
              </button>;
            })}
          </div>
        )},
        {title:"Profit Target",content:(
          <div>
            <div style={{fontSize:14,color:"#9ca3af",marginBottom:16}}>What % profit to pass the evaluation?</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[6,8,10,12,15].map(v=>(
                <button key={v} onClick={()=>setForm(f=>({...f,profitTarget:v}))} style={{padding:"14px 20px",background:form.profitTarget===v?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.profitTarget===v?"#34d399":"#1a2332"}`,borderRadius:10,color:form.profitTarget===v?"#34d399":"#9ca3af",fontSize:15,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:600,transition:"all 0.15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{v}%</span><span style={{fontSize:13,opacity:0.6}}>${((form.accountSize*v)/100).toLocaleString()}</span>
                </button>
              ))}
            </div>
          </div>
        )},
        {title:"Trading Days Rule",content:(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:4}}>Do you need 5 trading days to pass the evaluation?</div>
            {[
              {val:true,label:"5 Trading Days",desc:"Must trade on 5 separate days before you can pass"},
              {val:false,label:"None",desc:"No trading days requirement — pass on profit target alone"},
            ].map(({val,label,desc})=>(
              <button key={String(val)} onClick={()=>setForm(f=>({...f,winDaysEnabled:val,minTradingDays:val?5:0}))} style={{padding:"18px 20px",background:form.winDaysEnabled===val?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.winDaysEnabled===val?"#34d399":"#1a2332"}`,borderRadius:10,color:"#e2e8f0",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:form.winDaysEnabled===val?"#34d399":"#e2e8f0",marginBottom:4}}>{label}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{desc}</div>
              </button>
            ))}
          </div>
        )},
        {title:"Consistency Rule",content:(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:4}}>Should your biggest trading day be limited to 50% of total profit?</div>
            {[{val:"50% Consistency",label:"50% Consistency",desc:"No single day can account for more than 50% of your total profit"},{val:"None",label:"No Consistency Rule",desc:"Trade freely with no restrictions on daily profit distribution"}].map(({val,label,desc})=>(
              <button key={val} onClick={()=>setForm(f=>({...f,consistencyRule:val}))} style={{padding:"18px 20px",background:form.consistencyRule===val?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.consistencyRule===val?"#34d399":"#1a2332"}`,borderRadius:10,color:"#e2e8f0",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:form.consistencyRule===val?"#34d399":"#e2e8f0",marginBottom:4}}>{label}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{desc}</div>
              </button>
            ))}
          </div>
        )},
        {title:"Drawdown Rules",content:(
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div>
              <div style={{fontSize:12,color:"#9ca3af",marginBottom:10,fontFamily:"'Syne',sans-serif",fontWeight:600,letterSpacing:"1px"}}>DRAWDOWN TYPE</div>
              <div style={{display:"flex",gap:10}}>
                {["End Of Day","Trailing","Static"].map(v=>(
                  <button key={v} onClick={()=>setForm(f=>({...f,drawdownType:v}))} style={{flex:1,padding:"12px",background:form.drawdownType===v?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.drawdownType===v?"#34d399":"#1a2332"}`,borderRadius:8,color:form.drawdownType===v?"#34d399":"#6b7280",fontSize:12,cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace",transition:"all 0.15s"}}>{v}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:12,color:"#9ca3af",marginBottom:10,fontFamily:"'Syne',sans-serif",fontWeight:600,letterSpacing:"1px"}}>MAX TOTAL DRAWDOWN</div>
              <div style={{display:"flex",gap:8}}>
                {[1500,2000,3000,5000].map(v=>(
                  <button key={v} onClick={()=>setForm(f=>({...f,maxDrawdownAmt:v}))} style={{flex:1,padding:"10px 0",background:form.maxDrawdownAmt===v?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.maxDrawdownAmt===v?"#34d399":"#1a2332"}`,borderRadius:8,color:form.maxDrawdownAmt===v?"#34d399":"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace",transition:"all 0.15s"}}>${v.toLocaleString()}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:12,color:"#9ca3af",marginBottom:10,fontFamily:"'Syne',sans-serif",fontWeight:600,letterSpacing:"1px"}}>MAX DAILY LOSS</div>
              <div style={{display:"flex",gap:8}}>
                {[1,2,3,0].map(v=>(
                  <button key={v} onClick={()=>setForm(f=>({...f,maxDailyLossPct:v}))} style={{flex:1,padding:"10px 0",background:form.maxDailyLossPct===v?"rgba(52,211,153,0.15)":"#0a0c0f",border:`1px solid ${form.maxDailyLossPct===v?"#34d399":"#1a2332"}`,borderRadius:8,color:form.maxDailyLossPct===v?"#34d399":"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace",transition:"all 0.15s"}}>{v===0?"OFF":`${v}%`}</button>
                ))}
              </div>
            </div>
          </div>
        )},
      ];

      return (
        <div style={{fontFamily:"'Roboto', sans-serif,monospace",background:"#0a0c0f",minHeight:"100vh",color:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{width:"100%",maxWidth:440}}>
            <div style={{textAlign:"center",marginBottom:40}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,letterSpacing:"-1px",marginBottom:8}}>TRADELOG <span style={{color:"#34d399"}}>PRO+</span></div>
              <div style={{color:"#4a5568",fontSize:14}}>Set up your evaluation account</div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:32,justifyContent:"center"}}>
              {steps.map((_,i)=>(
                <div key={i} style={{height:4,flex:1,maxWidth:60,borderRadius:2,background:i<=step?"#34d399":"#1a2332",transition:"background 0.3s"}}/>
              ))}
            </div>
            <div style={{background:"#0f1419",border:"1px solid #1a2332",borderRadius:16,padding:28,marginBottom:20}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,marginBottom:24}}>{steps[step].title}</div>
              {steps[step].content}
            </div>
            <div style={{display:"flex",gap:12}}>
              {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"14px",background:"transparent",border:"1px solid #1a2332",borderRadius:10,color:"#9ca3af",cursor:"pointer",fontFamily:"'Roboto', sans-serif,monospace"}}>← Back</button>}
              {step<steps.length-1
                ?<button className="btn-green" style={{flex:1,padding:"14px",fontSize:15}} onClick={()=>setStep(s=>s+1)}>Next →</button>
                :<button className="btn-green" style={{flex:1,padding:"14px",fontSize:15}} onClick={finish}>Start Evaluation 🚀</button>
              }
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
